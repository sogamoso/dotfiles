# AeroSpace — Omarchy/Hyprland keybinding parity
#
# Physical keys map directly:
#   alt  in this config = physical Option key = SUPER on Omarchy
#   cmd  in this config = physical Command key = ALT on Omarchy

start-at-login = true

after-startup-command = [
    'exec-and-forget borders active_color=0xffff9e64 inactive_color=0xff414868 width=4.0'
]

# Tiling: windows open on the current workspace (like Omarchy).
# split opposite on every new window produces dwindle/fibonacci layout.
default-root-container-orientation = 'horizontal'
enable-normalization-flatten-containers = false

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['exec-and-forget $HOME/.config/aerospace/on-focus-changed.sh']
automatically-unhide-macos-hidden-apps = true

exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Gaps — matches Omarchy (gaps_in=5, gaps_out=10)
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.bottom     = 10
outer.top        = 38
outer.right      = 10

# -------------------------------------------------------
# Main bindings
# -------------------------------------------------------
[mode.main.binding]

# Workspace switching — Omarchy: SUPER + 1-9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-s = 'workspace 10' # SUPER+S → scratchpad

# Move window to workspace and follow — Omarchy: SUPER + SHIFT + 1-9,0
alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
alt-shift-9 = 'move-node-to-workspace --focus-follows-window 9'
alt-shift-s = 'move-node-to-workspace --focus-follows-window 10'

# Move window to workspace without following — Omarchy: SUPER + SHIFT + ALT + 1-9,0
alt-shift-cmd-1 = 'move-node-to-workspace 1'
alt-shift-cmd-2 = 'move-node-to-workspace 2'
alt-shift-cmd-3 = 'move-node-to-workspace 3'
alt-shift-cmd-4 = 'move-node-to-workspace 4'
alt-shift-cmd-5 = 'move-node-to-workspace 5'
alt-shift-cmd-6 = 'move-node-to-workspace 6'
alt-shift-cmd-7 = 'move-node-to-workspace 7'
alt-shift-cmd-8 = 'move-node-to-workspace 8'
alt-shift-cmd-9 = 'move-node-to-workspace 9'
alt-shift-cmd-s = 'move-node-to-workspace 10'

# Focus navigation — Omarchy: SUPER + arrows
alt-left  = 'focus left'
alt-right = 'focus right'
alt-up    = 'focus up'
alt-down  = 'focus down'

# Move windows — Omarchy: SUPER + SHIFT + arrows (remapped to free Option+Shift+Arrow for word selection)
alt-ctrl-left  = 'move left'
alt-ctrl-right = 'move right'
alt-ctrl-up    = 'move up'
alt-ctrl-down  = 'move down'

# Window controls
alt-w = ['close', 'exec-and-forget aerospace workspace $AEROSPACE_FOCUSED_WORKSPACE'] # Omarchy: SUPER + W — stay on workspace even if empty
alt-f = 'fullscreen' # Omarchy: SUPER + F
alt-t = 'layout floating tiling' # Omarchy: SUPER + T (toggle float)
alt-j = 'layout tiles horizontal vertical' # Omarchy: SUPER + J (toggle split)
alt-l = 'layout tiles accordion' # Omarchy: SUPER + L (toggle layout)
alt-b = 'balance-sizes' # Balance all windows in workspace
alt-r = 'flatten-workspace-tree' # SUPER+R → reset workspace layout

# Workspace cycling — Omarchy: SUPER + TAB
alt-tab       = 'exec-and-forget ~/.config/sketchybar/plugins/workspace_next.sh'
alt-shift-tab = 'exec-and-forget ~/.config/sketchybar/plugins/workspace_prev.sh'
alt-ctrl-tab = 'workspace-back-and-forth' # SUPER+Ctrl+Tab → former workspace

# Resize
alt-minus       = 'resize width -50'
alt-equal       = 'resize width +50'
alt-shift-minus = 'resize height -50'
alt-shift-equal = 'resize height +50'

# App launchers — see launch-or-focus.sh
alt-enter       = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new Ghostty' # Omarchy: SUPER + RETURN
alt-shift-enter = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new "Google Chrome"' # Omarchy: SUPER + SHIFT + RETURN
alt-shift-n     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new Zed' # Omarchy: SUPER + SHIFT + N
alt-shift-c     = 'exec-and-forget $HOME/.config/aerospace/open-fastmail.sh c' # SUPER+SHIFT+C → Fastmail (calendar)
alt-shift-e     = 'exec-and-forget $HOME/.config/aerospace/open-fastmail.sh m' # SUPER+SHIFT+E → Fastmail (mail)
alt-shift-g     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh net.whatsapp.WhatsApp' # Omarchy: SUPER+SHIFT+G → WhatsApp
alt-shift-m     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh com.spotify.client' # Omarchy: SUPER+SHIFT+M → Spotify
alt-shift-o     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh md.obsidian' # Omarchy: SUPER+SHIFT+O → Obsidian
alt-shift-f     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh Finder' # Omarchy: SUPER+SHIFT+F → Finder
alt-shift-slash = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh com.1password.1password' # Omarchy: SUPER+SHIFT+/ → 1Password
alt-shift-a     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh com.anthropic.claudefordesktop' # SUPER+SHIFT+A → Claude
alt-shift-y     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh YouTube' # Omarchy: SUPER+SHIFT+Y → YouTube
alt-cmd-enter   = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new Ghostty --args -e tmux new-session -A -s main' # ALT+RETURN → Ghostty+tmux
alt-shift-cmd-b = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new "Google Chrome" --args --incognito' # ALT+SHIFT+B → Chrome incognito
alt-shift-d     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new Ghostty --args -e lazydocker' # SUPER+SHIFT+D → LazyDocker
alt-shift-i     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh notion.id' # SUPER+SHIFT+I → Notion
alt-shift-l     = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh com.linear' # SUPER+SHIFT+L → Linear

# System controls
alt-ctrl-c   = 'exec-and-forget open "cleanshot://all-in-one"' # SUPER+Ctrl+C → CleanShot all-in-one
alt-ctrl-f13 = 'exec-and-forget open "cleanshot://capture-text"' # Omarchy: SUPER+CTRL+PRINT → OCR text extraction (PrtSc on external PC keyboards = F13 on macOS)
alt-ctrl-t   = 'exec-and-forget $HOME/.config/aerospace/launch-or-focus.sh --new Ghostty --args -e btop' # SUPER+Ctrl+T → btop
f14          = 'exec-and-forget $HOME/.config/dotfiles/mic-mute.sh' # Omarchy: XF86AudioMicMute → toggle mic mute (Lofree mic-mute key = F14 on macOS)

# Status notifications — Omarchy: SUPER+CTRL+ALT+{T,B,W}
alt-ctrl-cmd-t = 'exec-and-forget $HOME/.config/dotfiles/status.sh time'
alt-ctrl-cmd-b = 'exec-and-forget $HOME/.config/dotfiles/status.sh battery'
alt-ctrl-cmd-w = 'exec-and-forget $HOME/.config/dotfiles/status.sh weather'

# -------------------------------------------------------
# Dwindle: split opposite for every new window
# -------------------------------------------------------
[[on-window-detected]]
run = ['split opposite']
