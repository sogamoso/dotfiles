# AeroSpace — Omarchy/Hyprland keybinding parity
#
# Karabiner swaps Cmd↔Ctrl at hardware level, so:
#   Physical Cmd  = ctrl in this config = SUPER on Omarchy
#   Physical Ctrl = cmd  in this config
#   Physical Alt  = alt  in this config = ALT on Omarchy

start-at-login = true

# Dwindle/Fibonacci tiling — matches Hyprland's "layout = dwindle"
# opposite-orientation: nested containers alternate H/V automatically
# flatten-containers: removes redundant single-child nesting
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps — matches Omarchy (gaps_in=5, gaps_out=10)
[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 10
outer.bottom     = 10
outer.top        = 8
outer.right      = 10

# -------------------------------------------------------
# Main bindings
# -------------------------------------------------------
[mode.main.binding]

# Workspace switching — Omarchy: SUPER + 1-9,0
ctrl-1 = ['workspace 1',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=1']
ctrl-2 = ['workspace 2',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=2']
ctrl-3 = ['workspace 3',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=3']
ctrl-4 = ['workspace 4',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=4']
ctrl-5 = ['workspace 5',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=5']
ctrl-6 = ['workspace 6',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=6']
ctrl-7 = ['workspace 7',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=7']
ctrl-8 = ['workspace 8',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=8']
ctrl-9 = ['workspace 9',  'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=9']
ctrl-0 = ['workspace 10', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=10']

# Move window to workspace — Omarchy: SUPER + SHIFT + 1-9,0
ctrl-shift-1 = 'move-node-to-workspace 1'
ctrl-shift-2 = 'move-node-to-workspace 2'
ctrl-shift-3 = 'move-node-to-workspace 3'
ctrl-shift-4 = 'move-node-to-workspace 4'
ctrl-shift-5 = 'move-node-to-workspace 5'
ctrl-shift-6 = 'move-node-to-workspace 6'
ctrl-shift-7 = 'move-node-to-workspace 7'
ctrl-shift-8 = 'move-node-to-workspace 8'
ctrl-shift-9 = 'move-node-to-workspace 9'
ctrl-shift-0 = 'move-node-to-workspace 10'

# Focus navigation — Omarchy: SUPER + arrows
ctrl-left  = 'focus left'
ctrl-right = 'focus right'
ctrl-up    = 'focus up'
ctrl-down  = 'focus down'

# Move windows — Omarchy: SUPER + SHIFT + arrows
ctrl-shift-left  = 'move left'
ctrl-shift-right = 'move right'
ctrl-shift-up    = 'move up'
ctrl-shift-down  = 'move down'

# Window controls
ctrl-w = 'close'                          # Omarchy: SUPER + W
ctrl-f = 'fullscreen'                     # Omarchy: SUPER + F
ctrl-t = 'layout floating tiling'         # Omarchy: SUPER + T (toggle float)
ctrl-j = 'layout tiles horizontal vertical' # Omarchy: SUPER + J (toggle split)
ctrl-l = 'layout tiles accordion'         # Omarchy: SUPER + L (toggle layout)

# Workspace cycling — Omarchy: SUPER + TAB
ctrl-tab       = 'workspace next'
ctrl-shift-tab = 'workspace prev'

# Resize
ctrl-minus       = 'resize width -50'
ctrl-equal       = 'resize width +50'
ctrl-shift-minus = 'resize height -50'
ctrl-shift-equal = 'resize height +50'

# App launchers
ctrl-enter       = 'exec-and-forget open -na Ghostty'         # Omarchy: SUPER + RETURN
ctrl-shift-enter = 'exec-and-forget open -na "Google Chrome"' # Omarchy: SUPER + SHIFT + RETURN
ctrl-shift-n     = 'exec-and-forget open -na Zed'             # Omarchy: SUPER + SHIFT + N

# -------------------------------------------------------
# Window rules
# 1: Chrome   2: Ghostty  3: Slack     4: Gmail
# 5: Calendar 6: Notion   7: Spotify   8: YouTube
# 9: (free)   10: scratchpad
# -------------------------------------------------------

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace --focus-follows-window 1']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace --focus-follows-window 2']

[[on-window-detected]]
if.app-id = 'io.alacritty'
run = ['move-node-to-workspace --focus-follows-window 2']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace --focus-follows-window 3']

[[on-window-detected]] # Gmail (Chrome PWA)
if.app-id = 'com.google.Chrome.app.fmgjjmmmlfnkbppncabfkddbjimcfncm'
run = ['move-node-to-workspace --focus-follows-window 4']

[[on-window-detected]] # Google Calendar (Chrome PWA)
if.app-id = 'com.google.Chrome.app.kjbdgfilnfhdoflbpgamdcdgpehopbep'
run = ['move-node-to-workspace --focus-follows-window 5']

[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace --focus-follows-window 6']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace --focus-follows-window 7']

[[on-window-detected]] # YouTube (Chrome PWA)
if.app-id = 'com.google.Chrome.app.agimnkijcaahngcdmfeangaknmldooml'
run = ['move-node-to-workspace --focus-follows-window 8']
