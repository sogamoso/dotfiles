# AeroSpace — workspace switching only, no tiling
# Rectangle Pro handles window snapping, Hammerspoon handles hotkeys

start-at-login = true

[mode.main.binding]
cmd-1 = ['workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=1']
cmd-2 = ['workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=2']
cmd-3 = ['workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=3']
cmd-4 = ['workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=4']
cmd-5 = ['workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=5']
cmd-6 = ['workspace 6', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=6']
cmd-7 = ['workspace 7', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=7']
cmd-8 = ['workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=8']
cmd-9 = ['workspace 9', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=9']

# Workspace app assignments
# Each rule moves the window to its workspace AND floats it (so Rectangle Pro controls positioning)

# 1: Browsing
[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ['layout floating', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = "com.apple.Safari"
run = ['layout floating', 'move-node-to-workspace 1']

