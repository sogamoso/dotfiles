start-at-login = true

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

[mode.main.binding]

# Focus window
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Layout
alt-f       = 'fullscreen'
alt-shift-f = 'layout floating tiling'
alt-slash   = 'layout tiles horizontal vertical'
alt-comma   = 'layout accordion horizontal vertical'

# Switch workspace
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'

# Move window to workspace
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'

# Workspace 1 — Browsing
[[on-window-detected]]
if.app-name-regex-substring = 'Google Chrome|Safari'
run = 'move-node-to-workspace 1'

# Workspace 2 — Programming
[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty|Alacritty|Zed|Linear|GitHub|TablePlus'
run = 'move-node-to-workspace 2'

# Workspace 3 — Communication
[[on-window-detected]]
if.app-name-regex-substring = 'Slack|Google Meet|WhatsApp|Discord'
run = 'move-node-to-workspace 3'

# Workspace 4 — Scheduling
[[on-window-detected]]
if.app-name-regex-substring = 'Gmail|Google Calendar'
run = 'move-node-to-workspace 4'

# Workspace 5 — Writing
[[on-window-detected]]
if.app-name-regex-substring = 'Typora|Obsidian|Notion|Notes'
run = 'move-node-to-workspace 5'

# Workspace 6 — AI Tools
[[on-window-detected]]
if.app-name-regex-substring = 'ChatGPT|Claude|Codex'
run = 'move-node-to-workspace 6'

# Workspace 7 — Entertainment
[[on-window-detected]]
if.app-name-regex-substring = 'Spotify|YouTube'
run = 'move-node-to-workspace 7'
